spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/auth-api}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:123456789}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}

  #This configuration is only for development
  security:
    user:
      name: admin
      password: admin123

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:dev-secret-key-change-this-in-production-min-256-bits}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000
